}
async function sbPost(table, data) {
  const r = await fetch(`${SB_URL}/${table}`, { method: "POST", headers: SB_HEADERS, body: JSON.stringify(data) });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
}
async function sbUpsert(table, data, onConflict) {
  const headers = {...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation'};
  const r = await fetch(`${SB_URL}/${table}?on_conflict=${onConflict}`, { method: "POST", headers, body: JSON.stringify(data) });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}
async function sbDelete(table, params) {
  const r = await fetch(`${SB_URL}/${table}?${params}`, { method: "DELETE", headers: SB_HEADERS });

function showToast(msg, tipo) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=tipo||'ok'; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}
function isFuture(iso) { return new Date(iso) >= new Date(new Date().toDateString()); }
function initials(n)   { const p=n.split(' '); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase(); }
function estaApuntado(jug, jid) { return inscripciones.some(i=>i.jugador===jug && i.jornada===jid); }
function inscritos(jid)         { return JUGADORES.filter(j=>estaApuntado(j.nombre,jid)).sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')); }
function hcpJuego(jugador, jornada) {
  if (!jornada || !jornada.cr_h) return Math.min(jugador.hcp, 36.0).toFixed(1) + ' *';
  const h = Math.min(jugador.hcp, 36.0);
  const cr    = jugador.sexo === 'M' ? jornada.cr_m    : jornada.cr_h;
  const slope = jugador.sexo === 'M' ? jornada.slope_m : jornada.slope_h;
  return Math.round(h * (slope / 113) + (cr - jornada.par));
}
function avatarHTML(nombre, sexo, dark) {
  const cls = dark ? (sexo==="M"?"avatar avatar-m-dark":"avatar avatar-h-dark")
                   : (sexo==="M"?"avatar avatar-m":"avatar avatar-h");
  return `<div class="${cls}">${initials(nombre)}</div>`;
}

    } else {
      await sbPost("inscripciones", {jugador: jugadorActual, jornada: jid});
      inscripciones.push({jugador: jugadorActual, jornada: jid});
      showToast(`Apuntado a ${jid} ✓`);
    }
    render();
  } catch(e) {
    showToast("Error: "+e.message,"warn");
  }
}

// ═══════════════════════════════════════════════
// CLASIFICACIÓN
// ═══════════════════════════════════════════════
function calcClasificacion(tipo) {
  const por={};
  JUGADORES.forEach(j=>{ por[j.nombre]=[]; });
  JORNADAS.forEach(jor=>{
    resultados.filter(r=>r.jornada===jor.id && r[tipo]!=null)
      .forEach(r=>{ if(por[r.jugador]) por[r.jugador].push(r[tipo]); });
  });
  const top4=arr=>[...arr].sort((a,b)=>b-a).slice(0,4).reduce((s,v)=>s+v,0);
  return JUGADORES
    .map(j=>({nombre:j.nombre,hcp:j.hcp,sexo:j.sexo,total:top4(por[j.nombre]),jornadas:por[j.nombre].length}))
    .filter(j=>j.jornadas>0)
    .sort((a,b)=>b.total!==a.total?b.total-a.total:tipo==="stableford"?a.hcp-b.hcp:b.hcp-a.hcp);
}

function resultadosJornada(jid, tipo) {
  return [...resultados.filter(r=>r.jornada===jid && r[tipo]!=null)]
    .sort((a,b)=>{
      if(b[tipo]!==a[tipo]) return b[tipo]-a[tipo];
      const ja=JUGADORES.find(j=>j.nombre===a.jugador);
      const jb=JUGADORES.find(j=>j.nombre===b.jugador);
      if(!ja||!jb) return 0;
      return tipo==="stableford"?ja.hcp-jb.hcp:jb.hcp-ja.hcp;
    });
}

// ═══════════════════════════════════════════════
// EXPORTAR BACKUP COMPLETO (todas las jornadas + resultados)
// ═══════════════════════════════════════════════
function exportarBackupCompleto() {
  if(inscripciones.length===0 && resultados.length===0){
    showToast("No hay datos que exportar","warn"); return;
  }
  const wb=XLSX.utils.book_new();

  // Hoja 1: Inscripciones (todas las jornadas)
  const datosInsc = inscripciones.map(i=>({
    'Jornada': i.jornada, 'Jugador': i.jugador
  })).sort((a,b)=> a.Jornada.localeCompare(b.Jornada) || a.Jugador.localeCompare(b.Jugador,'es'));
  const wsInsc=XLSX.utils.json_to_sheet(datosInsc);
  wsInsc['!cols']=[{wch:10},{wch:32}];
  XLSX.utils.book_append_sheet(wb,wsInsc,"Inscripciones");

  // Hoja 2: Resultados (todas las jornadas)
  const datosRes = resultados.map(r=>({
    'Jornada': r.jornada, 'Jugador': r.jugador,
    'Stableford': r.stableford, 'Scratch': r.scratch
  })).sort((a,b)=> a.Jornada.localeCompare(b.Jornada) || a.Jugador.localeCompare(b.Jugador,'es'));
  const wsRes=XLSX.utils.json_to_sheet(datosRes);
  wsRes['!cols']=[{wch:10},{wch:32},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsRes,"Resultados");

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`Backup_Campeonato_${fecha}.xlsx`);
  showToast("Backup completo descargado ✓");
}

// EXPORTAR EXCEL
// ═══════════════════════════════════════════════
function exportarExcel(jid) {
  const jornada=JORNADAS.find(j=>j.id===jid);
  const lista=inscritos(jid);
  if(lista.length===0){ showToast("Sin inscritos en "+jid,"warn"); return; }
  const datos=lista.map((j,i)=>({
    'Nº': i+1, 'Nombre': j.nombre, 'Licencia': j.licencia||'—',
    'HCP Exacto': Math.min(j.hcp,36).toFixed(1),
    'HCP Juego': hcpJuego(j, jornada), 'Tees': j.sexo==='M'?'Rojas':'Amarillas',
  }));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(datos);
  ws['!cols']=[{wch:4},{wch:28},{wch:14},{wch:12},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,"Inscritos");
  XLSX.writeFile(wb,`Inscritos_${jid}_${jornada.campo.replace(/ /g,'_')}.xlsx`);
  showToast("Excel descargado ✓");
}

// RENDER

function estaPagado(nombre) {
  const c = cuotas.find(x=>x.jugador===nombre);
  return c ? !!c.pagado : false;
}

async function toggleCuota(nombre, checkbox) {
  const nuevoEstado = checkbox.checked;
  checkbox.disabled = true;
  try {
    await sbUpsert("cuotas", [{ jugador: nombre, pagado: nuevoEstado, actualizado_en: new Date().toISOString() }], "jugador");
    const c = cuotas.find(x=>x.jugador===nombre);
    if(c) c.pagado = nuevoEstado; else cuotas.push({jugador:nombre, pagado:nuevoEstado});
    showToast(nuevoEstado ? `${nombre}: cuota marcada como pagada ✓` : `${nombre}: cuota marcada como pendiente`);
    render();
  } catch(e) {
    showToast("Error al actualizar: " + e.message, "warn");
    checkbox.checked = !nuevoEstado;
  } finally {
    checkbox.disabled = false;
  }
}
