const JORNADAS = [
  { id:"J1",  campo:"Montealvar Golf",            fecha:"18/06/2026", iso:"2026-06-18",
    cr_h:68.7, slope_h:125, cr_m:65.1, slope_m:114, par:72,
    pares:[5,3,4,5,4,4,4,4,3,4,5,3,4,5,3,4,4,4],
    hcps:[9,17,11,15,3,1,5,13,7,14,12,4,18,16,8,6,2,10] },
  { id:"J2",  campo:"Club de Golf La Dehesa",     fecha:"25/06/2026", iso:"2026-06-25",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J3",  campo:"El Robledal Golf",           fecha:"02/07/2026", iso:"2026-07-02",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J4",  campo:"Centro Nacional de Golf",    fecha:"09/07/2026", iso:"2026-07-09",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J5",  campo:"Golf Santander SA",          fecha:"16/07/2026", iso:"2026-07-16",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J6",  campo:"Real Club La Herreria",      fecha:"23/07/2026", iso:"2026-07-23",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J7",  campo:"Cabanillas Casa de Campo",   fecha:"30/07/2026", iso:"2026-07-30",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J8",  campo:"El Encin Golf",              fecha:"03/09/2026", iso:"2026-09-03",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J9",  campo:"Real Club Lomas-Bosque",     fecha:"10/09/2026", iso:"2026-09-10",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
  { id:"J10", campo:"Golf Olivar de la Hinojosa", fecha:"17/09/2026", iso:"2026-09-17",
    cr_h:null, slope_h:null, cr_m:null, slope_m:null, par:72, pares:[], hcps:[] },
];

const MEDALS = ["🥇","🥈","🥉"];
const IKEY = "tecnatom_inscripciones_v1";
const RKEY = "tecnatom_resultados_v1";
const ADM_PWD = "Tecnatom";

let inscripciones = {};
let resultados    = {};
let jugadorActual = "";
let tabActual     = "inscripcion";
let jornadaDetalle= null;
let resVista      = "general";
let resTipo       = "stableford";
let admAuth       = false;

try { const s=localStorage.getItem(IKEY); if(s) inscripciones=JSON.parse(s); } catch(e){}
try { const r=localStorage.getItem(RKEY); if(r) resultados=JSON.parse(r); } catch(e){}

// ═══════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════
function guardar() { try { localStorage.setItem(IKEY, JSON.stringify(inscripciones)); } catch(e){} }

function showToast(msg, tipo) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=tipo||'ok'; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}

function isFuture(iso) { return new Date(iso) >= new Date(new Date().toDateString()); }
function initials(n)   { const p=n.split(' '); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase(); }
function estaApuntado(jug,jid) { return !!inscripciones[jug+'__'+jid]; }
function inscritos(jid)        { return JUGADORES.filter(j=>estaApuntado(j.nombre,jid)); }

function hcpJuego(jugador, jornada) {
  const cr    = jugador.sexo==='H' ? jornada.cr_h    : jornada.cr_m;
  const slope = jugador.sexo==='H' ? jornada.slope_h : jornada.slope_m;
  if (!cr || !slope) return Math.min(jugador.hcp, 36.0);
  const hcpExacto = Math.min(jugador.hcp, 36.0);
  return Math.round(hcpExacto * (slope/113) + (cr - jornada.par));
}

function avatarHTML(nombre, sexo, dark) {
  const cls = dark ? (sexo==='M'?'avatar avatar-m-dark':'avatar avatar-h-dark')
                   : (sexo==='M'?'avatar avatar-m':'avatar avatar-h');
  return `<div class="${cls}">${initials(nombre)}</div>`;
}

// ═══════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════
function showTab(t) {
  tabActual=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['inscripcion','resultados','handicaps','calendario','administracion'][i]===t);
  });
  render();
}
function onJugadorChange(v) { jugadorActual=v; render(); }
function setResVista(v)     { resVista=v; render(); }
function setResTipo(v)      { resTipo=v; render(); }
function toggleDetalle(jid) { jornadaDetalle=jornadaDetalle===jid?null:jid; render(); }

function toggleInscripcion(jid) {
  if(!jugadorActual){ showToast("Primero selecciona tu nombre","warn"); return; }
  const k=jugadorActual+'__'+jid;
  if(inscripciones[k]){ delete inscripciones[k]; showToast("Baja en "+jid); }
  else { inscripciones[k]=true; showToast("Apuntado a "+jid+" ✓"); }
  guardar(); render();
}

function admLogin() {
  const v=document.getElementById('adm-pwd').value;
  if(v===ADM_PWD){ admAuth=true; render(); }
  else { document.getElementById('adm-error').style.display='block'; document.getElementById('adm-pwd').value=''; }
}

// ═══════════════════════════════════════════════════════
// RESULTADOS
// ═══════════════════════════════════════════════════════
function calcClasificacion(tipo) {
  const por={};
  JUGADORES.forEach(j=>{ por[j.nombre]=[]; });
  JORNADAS.forEach(jor=>{
    const res=resultados[jor.id]; if(!res) return;
    res.forEach(r=>{ if(por[r.nombre]&&r[tipo]!=null) por[r.nombre].push(r[tipo]); });
  });
  const top4=arr=>[...arr].sort((a,b)=>b-a).slice(0,4).reduce((s,v)=>s+v,0);
  return JUGADORES
    .map(j=>({nombre:j.nombre,hcp:j.hcp,sexo:j.sexo,total:top4(por[j.nombre]),jornadas:por[j.nombre].length}))
    .filter(j=>j.jornadas>0)
    .sort((a,b)=>b.total!==a.total?b.total-a.total:tipo==="stableford"?a.hcp-b.hcp:b.hcp-a.hcp);
}

function resultadosJornada(jid, tipo) {
  const res=resultados[jid]; if(!res) return [];
  return [...res].filter(r=>r[tipo]!=null).sort((a,b)=>{
    if(b[tipo]!==a[tipo]) return b[tipo]-a[tipo];
    const ja=JUGADORES.find(j=>j.nombre===a.nombre);
    const jb=JUGADORES.find(j=>j.nombre===b.nombre);
    if(!ja||!jb) return 0;
    return tipo==="stableford"?ja.hcp-jb.hcp:jb.hcp-ja.hcp;
  });
}

// ═══════════════════════════════════════════════════════
// EXPORTAR EXCEL
// ═══════════════════════════════════════════════════════
function exportarExcel(jid) {
  const jornada = JORNADAS.find(j=>j.id===jid);
  const lista   = inscritos(jid);
  if(lista.length===0){ showToast("Sin inscritos en "+jid,"warn"); return; }

  const datos = lista.map((j,i)=>({
    'Nº':          i+1,
    'Nombre':      j.nombre,
    'Licencia':    j.licencia || '—',
    'HCP Exacto':  Math.min(j.hcp, 36.0).toFixed(1),
    'HCP Juego':   hcpJuego(j, jornada),
    'Tees':        j.sexo==='M'?'Rojas':'Amarillas',
  }));

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(datos);

  // Anchos de columna
  ws['!cols'] = [{wch:4},{wch:28},{wch:14},{wch:12},{wch:10},{wch:10}];

  XLSX.utils.book_append_sheet(wb, ws, "Inscritos");
  XLSX.writeFile(wb, `Inscritos_${jid}_${jornada.campo.replace(/ /g,'_')}.xlsx`);
  showToast("Excel descargado ✓");
}

// ═══════════════════════════════════════════════════════
// GENERAR TARJETAS PDF
// ═══════════════════════════════════════════════════════
function generarTarjetas(jid) {
  const jornada = JORNADAS.find(j=>j.id===jid);
  const lista   = inscritos(jid);

  if(lista.length===0){ showToast("Sin inscritos en "+jid,"warn"); return; }
  if(!jornada.cr_h){
    showToast("Datos del campo pendientes para "+jid,"warn");
    return;
  }

  showToast("Generando tarjetas…");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

  const pares = jornada.pares;
  const hcps  = jornada.hcps;

  // Colores
  const GREEN   = [27, 67, 50];
  const LGRAY   = [245, 245, 245];
  const DGRAY   = [80, 80, 80];
  const BLACK   = [0, 0, 0];
  const WHITE   = [255, 255, 255];
  const YELLOW  = [255, 230, 100];
  const BLUE    = [200, 220, 255];

  // Tarjeta: 2 por página, apaisadas en vertical
  // Cada tarjeta ocupa media A4 (210 x 148.5 mm aprox)
  const PW = 210; // page width
  const CH = 145; // card height
  const MARGIN = 5;

  lista.forEach((jugador, idx) => {
    if(idx > 0 && idx % 2 === 0) doc.addPage();

    const yOffset = (idx % 2 === 0) ? 2 : 150;
    const hj = hcpJuego(jugador, jornada);
    const hcpExacto = Math.min(jugador.hcp, 36.0);

    // ── Marco exterior ──
    doc.setDrawColor(...BLACK);
    doc.setLineWidth(0.5);
    doc.rect(MARGIN, yOffset+1, PW-2*MARGIN, CH-2, 'S');

    // ── Cabecera verde ──
    doc.setFillColor(...GREEN);
    doc.rect(MARGIN, yOffset+1, PW-2*MARGIN, 16, 'F');

    // Logo (pequeño placeholder)
    doc.setFillColor(...WHITE);
    doc.rect(MARGIN+2, yOffset+2, 12, 12, 'F');
    doc.setFontSize(5);
    doc.setTextColor(...GREEN);
    doc.text('LOGO', MARGIN+3, yOffset+9);

    // Título
    doc.setTextColor(...WHITE);
    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.text('XXXIV Campeonato de Golf Tecnatom 2026', MARGIN+17, yOffset+7);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.text(`${jornada.id} · ${jornada.campo} · ${jornada.fecha}`, MARGIN+17, yOffset+13);

    // ── Datos jugador ──
    doc.setTextColor(...BLACK);
    doc.setFontSize(10);
    doc.setFont('helvetica','bold');
    doc.text(jugador.nombre, MARGIN+3, yOffset+23);

    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(...DGRAY);
    doc.text(`HCP Juego: `, MARGIN+3, yOffset+29);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...BLACK);
    doc.text(`${hj}`, MARGIN+25, yOffset+29);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(...DGRAY);
    doc.text(`(exacto: ${hcpExacto.toFixed(1)})`, MARGIN+31, yOffset+29);

    doc.setFontSize(8);
    doc.text(`Tees: ${jugador.sexo==='M'?'Rojas':'Amarillas'}`, MARGIN+70, yOffset+29);
    doc.text(`Licencia: ${jugador.licencia||'—'}`, MARGIN+105, yOffset+29);

    // ── Tabla de hoyo ──
    const tY = yOffset + 34;
    const cols = 21; // # | 1-9 | IDA | 10-18 | VTA | TOT
    const colW = (PW - 2*MARGIN - 2) / cols;
    const rowH = 7;

    const headers = ['H', '1','2','3','4','5','6','7','8','9','IDA','10','11','12','13','14','15','16','17','18','VLT'];

    // Cabecera columnas
    doc.setFillColor(...GREEN);
    doc.rect(MARGIN+1, tY, PW-2*MARGIN-2, rowH, 'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(6);
    doc.setFont('helvetica','bold');
    headers.forEach((h,i)=>{
      const x = MARGIN+1 + i*colW + colW/2;
      doc.text(h, x, tY+4.5, {align:'center'});
    });

    // Función fila
    function fila(y, label, valores, bgColor, textColor, bold) {
      doc.setFillColor(...bgColor);
      doc.rect(MARGIN+1, y, PW-2*MARGIN-2, rowH, 'F');
      doc.setTextColor(...textColor);
      doc.setFont('helvetica', bold?'bold':'normal');
      doc.setFontSize(6.5);

      // Label
      doc.text(label, MARGIN+1+colW/2, y+4.5, {align:'center'});

      const v9 = valores.slice(0,9);
      const v10 = valores.slice(9,18);
      const sum9 = v9.reduce((s,v)=>s+(v||0),0);
      const sum10 = v10.reduce((s,v)=>s+(v||0),0);

      v9.forEach((v,i)=>{
        const x = MARGIN+1 + (i+1)*colW + colW/2;
        doc.text(v!=null?String(v):'', x, y+4.5, {align:'center'});
      });
      doc.text(String(sum9), MARGIN+1+10*colW+colW/2, y+4.5, {align:'center'});
      v10.forEach((v,i)=>{
        const x = MARGIN+1 + (i+11)*colW + colW/2;
        doc.text(v!=null?String(v):'', x, y+4.5, {align:'center'});
      });
      doc.text(String(sum10), MARGIN+1+20*colW+colW/2, y+4.5, {align:'center'});

      // Bordes
      doc.setDrawColor(200,200,200);
      doc.setLineWidth(0.1);
      for(let i=0;i<=cols;i++){
        const x = MARGIN+1+i*colW;
        doc.line(x, y, x, y+rowH);
      }
      doc.line(MARGIN+1, y+rowH, MARGIN+1+(PW-2*MARGIN-2), y+rowH);
    }

    fila(tY+rowH,   'PAR',  pares,  LGRAY, BLACK, false);
    fila(tY+rowH*2, 'HCP',  hcps,   WHITE, DGRAY, false);

    // Filas de puntuación vacías
    fila(tY+rowH*3, 'BRUTO', Array(18).fill(null), WHITE, BLACK, false);
    fila(tY+rowH*4, 'NETO',  Array(18).fill(null), LGRAY, BLACK, false);
    fila(tY+rowH*5, 'STBL',  Array(18).fill(null), WHITE, BLACK, true);

    // ── Cajas de resultado ──
    const boxY = tY + rowH*6 + 3;
    const boxW = 45;
    const boxH = 22;

    // Scratch
    doc.setFillColor(...LGRAY);
    doc.rect(MARGIN+3, boxY, boxW, boxH, 'F');
    doc.setDrawColor(...BLACK);
    doc.setLineWidth(0.3);
    doc.rect(MARGIN+3, boxY, boxW, boxH, 'S');
    doc.setFontSize(7);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...BLACK);
    doc.text('RESULTADO SCRATCH', MARGIN+3+boxW/2, boxY+5, {align:'center'});
    doc.setFontSize(16);
    doc.setTextColor(...GREEN);
    doc.text('___', MARGIN+3+boxW/2, boxY+17, {align:'center'});

    // Stableford
    doc.setFillColor(...LGRAY);
    doc.rect(MARGIN+3+boxW+5, boxY, boxW, boxH, 'F');
    doc.setDrawColor(...BLACK);
    doc.rect(MARGIN+3+boxW+5, boxY, boxW, boxH, 'S');
    doc.setFontSize(7);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...BLACK);
    doc.text('RESULTADO STABLEFORD', MARGIN+3+boxW+5+boxW/2, boxY+5, {align:'center'});
    doc.setFontSize(16);
    doc.setTextColor(...GREEN);
    doc.text('___', MARGIN+3+boxW+5+boxW/2, boxY+17, {align:'center'});

    // Firma
    doc.setFontSize(6.5);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...DGRAY);
    doc.text('Firma del jugador: _______________________', MARGIN+110, boxY+10);
    doc.text('Firma del marcador: ______________________', MARGIN+110, boxY+18);

    // Pie
    doc.setFontSize(5.5);
    doc.setTextColor(150,150,150);
    doc.text('Elaborado por la Oficina del CaddIA Master · Club de Golf de Tecnatom', PW/2, yOffset+CH-3, {align:'center'});

    // Línea separadora entre tarjetas
    if(idx%2===0 && idx<lista.length-1){
      doc.setDrawColor(200,200,200);
      doc.setLineWidth(0.3);
      doc.setLineDashPattern([2,2], 0);
      doc.line(MARGIN, 148, PW-MARGIN, 148);
      doc.setLineDashPattern([], 0);
    }
  });

  doc.save(`Tarjetas_${jid}_${jornada.campo.replace(/ /g,'_')}.pdf`);
  showToast("Tarjetas descargadas ✓");
}

            <td><span class="adm-hcp">${Math.min(jug.hcp,36).toFixed(1)}</span></td>
            <td><span class="adm-hcp">${hj}</span></td>
            <td style="font-size:11px;font-weight:600;color:${jug.sexo==='M'?'#1D4ED8':'#92400E'}">${jug.sexo==='M'?'🔴 Rojas':'🟡 Amarillas'}</td>
          </tr>`;
        });
        html+=`</tbody></table>
        <div class="adm-summary">
          <div><span class="adm-sum-num">${lista.length}</span><span class="adm-sum-lbl">Total</span></div>
          <div><span class="adm-sum-num">${hombres}</span><span class="adm-sum-lbl">Hombres</span></div>
          <div><span class="adm-sum-num">${mujeres}</span><span class="adm-sum-lbl">Mujeres</span></div>
        </div>`;
      }

      html+=`<div class="adm-actions">
        <button class="adm-btn adm-btn-excel" onclick="exportarExcel('${j.id}')"
          ${lista.length===0?'disabled style="opacity:0.4;cursor:not-allowed;"':''}>
          📥 Exportar Excel
        </button>
        <button class="adm-btn adm-btn-pdf${!tieneDatos?' disabled':''}"
          onclick="${tieneDatos?`generarTarjetas('${j.id}')`:`showToast('Datos del campo pendientes para ${j.id}','warn')`}"
          title="${tieneDatos?'Generar tarjetas PDF':'Datos del campo aún no disponibles'}">
          🖨️ Generar Tarjetas PDF${!tieneDatos?' (pendiente datos campo)':''}
        </button>
      </div>
      </div>`;
    });
    c.innerHTML=html;
  }
}

render();
</script>
</body>
</html>
